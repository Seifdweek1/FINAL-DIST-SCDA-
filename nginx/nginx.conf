# SCDA API gateway — TLS, redirects, rate limits, security headers.

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    server_tokens off;

    # Request body size (uploads via /api/documents/)
    client_max_body_size 25m;

    # General API: per-IP sustained rate (stricter burst via limit_req)
    limit_req_zone $binary_remote_addr zone=api_general:10m rate=25r/s;
    # Login: much stricter (brute-force mitigation)
    limit_req_zone $binary_remote_addr zone=api_login:10m rate=10r/m;
    limit_req_status 429;

    upstream auth_upstream {
        server auth-service:3001;
    }

    upstream document_upstream {
        server document-service:3002;
    }

    upstream ai_upstream {
        server ai-service:3003;
    }

    upstream audit_upstream {
        server audit-service:3004;
    }

    upstream frontend_upstream {
        server frontend:80;
    }

    # --- HTTP: internal health (no TLS) + redirect everything else to HTTPS ---
    server {
        listen 80 default_server;
        server_name localhost;

        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 "OK\n";
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # --- HTTPS: all API traffic (do not comment this block out) ---
    server {
        listen 443 ssl http2;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;

        # Security headers (API gateway + proxied JSON)
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        location = /nginx-health {
            access_log off;
            default_type text/plain;
            return 200 "OK\n";
        }

        # JSON bodies when upstream is unreachable (avoids HTML error pages breaking SPA JSON clients)
        location @json_upstream_unavailable {
            default_type application/json;
            return 502 '{"error":{"message":"Upstream service unavailable","code":"upstream_unavailable"}}';
        }

        # Stricter rate limit only for credential endpoint (exact URI)
        location = /api/auth/login {
            limit_req zone=api_login burst=5 nodelay;
            include /etc/nginx/snippets/proxy_params.conf;
            proxy_intercept_errors on;
            error_page 502 503 504 = @json_upstream_unavailable;
            proxy_pass http://auth_upstream/api/auth/login;
        }

        location /api/auth/ {
            limit_req zone=api_general burst=40 nodelay;
            include /etc/nginx/snippets/proxy_params.conf;
            proxy_intercept_errors on;
            error_page 502 503 504 = @json_upstream_unavailable;
            proxy_pass http://auth_upstream/api/auth/;
        }

        location /api/documents/ {
            limit_req zone=api_general burst=40 nodelay;
            include /etc/nginx/snippets/proxy_params.conf;
            proxy_intercept_errors on;
            error_page 502 503 504 = @json_upstream_unavailable;
            proxy_pass http://document_upstream/api/documents/;
        }

        location /api/ai/ {
            limit_req zone=api_general burst=40 nodelay;
            include /etc/nginx/snippets/proxy_params.conf;
            proxy_intercept_errors on;
            error_page 502 503 504 = @json_upstream_unavailable;
            proxy_pass http://ai_upstream/api/ai/;
        }

        location /api/audit/ {
            limit_req zone=api_general burst=40 nodelay;
            include /etc/nginx/snippets/proxy_params.conf;
            proxy_intercept_errors on;
            error_page 502 503 504 = @json_upstream_unavailable;
            proxy_pass http://audit_upstream/api/audit/;
        }

        location / {
            limit_req zone=api_general burst=80 nodelay;
            include /etc/nginx/snippets/proxy_params.conf;
            proxy_pass http://frontend_upstream/;
        }
    }
}
